html, body {

body.theme-casino { background: radial-gradient(circle at top, #1e1e1e, #030303); --version-color: #ffd400; }
body.theme-fiesta { background: linear-gradient(135deg, #4d004d, #1a0033); --version-color: #ff00ff; }
body.theme-navidad { background: radial-gradient(circle, #052e16, #02120b); --version-color: #ff3333; }
body.theme-halloween { background: linear-gradient(135deg, #1a002c, #0a0a0a); --version-color: #ff6600; }
body.theme-cyber { background: #000810; --version-color: #00ffff; }
body.theme-verano { background: linear-gradient(135deg, #003542, #005f73); --version-color: #00ffcc; }
body.theme-dorado { background: radial-gradient(circle, #1f1a00, #050400); --version-color: #d4af37; }
body.theme-discoteca { background: radial-gradient(circle, #250036, #000000); --version-color: #39ff14; }

.overlay.pop-bg-oscuro { background: rgba(0, 0, 0, 0.94); backdrop-filter: blur(15px); }
.overlay.pop-bg-azul { background: radial-gradient(circle, rgba(0,50,150,0.96), rgba(0,10,40,0.99)); backdrop-filter: blur(12px); }
.overlay.pop-bg-rojo { background: radial-gradient(circle, rgba(150,0,40,0.96), rgba(40,0,5,0.99)); backdrop-filter: blur(12px); }
.overlay.pop-bg-verde { background: radial-gradient(circle, rgba(0,100,40,0.96), rgba(0,25,5,0.99)); backdrop-filter: blur(12px); }
.overlay.pop-bg-morado { background: radial-gradient(circle, rgba(80,0,120,0.96), rgba(20,0,35,0.99)); backdrop-filter: blur(12px); }

/* ================= CONTENEDOR APP ================= */
.container {
    display: flex; flex-direction: row; height: 100vh; padding: 6px; gap: 8px; box-sizing: border-box; width: 100%;
}

.panel-left {
    width: 24%; display: flex; flex-direction: column; gap: 4px; justify-content: space-between; height: 100%; box-sizing: border-box;
}

.figure-wrapper {
    background: rgba(0, 0, 0, 0.5); padding: 4px; border-radius: 10px;
    border: 1px solid rgba(255, 215, 0, 0.15);
}
.figure-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px;
}
.cell {
    aspect-ratio: 1; border-radius: 4px; background: rgba(255,255,255,0.03);
    display: flex; justify-content: center; align-items: center; font-size: 8px;
}
.cell.active {
    background: #ffd400; color: black; box-shadow: 0 0 6px #ffd400;
}

.display-box {
    background: rgba(255, 255, 255, 0.03); border-radius: 10px; padding: 4px;
    border: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; justify-content: center; align-items: center; flex: 1; min-height: 45px;
}

.action-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding-bottom: 2px;
}
.icon-btn {
    height: 36px; border-radius: 8px; background: rgba(255,255,255,0.08);
    display: flex; justify-content: center; align-items: center;
    cursor: pointer; font-size: 16px; transition: 0.1s; border: 1px solid rgba(255,255,255,0.1);
}
.icon-btn:hover { background: rgba(255,255,255,0.2); }

/* ================= TABLERO MASTER ================= */
.panel-right {
    flex: 1; background: rgba(255,255,255,0.01); border-radius: 12px;
    padding: 6px; display: flex; flex-direction: column; justify-content: space-between;
    box-sizing: border-box; border: 1px solid rgba(255,255,255,0.02); height: 100%; overflow: hidden;
}
.bingo-row { display: flex; align-items: center; height: 19%; gap: 4px; }
.letter-header { width: 45px; font-size: 32px; font-weight: 900; text-align: center; color: #ffd400; }

.numbers-subgrid { 
    flex: 1; display: grid; grid-template-columns: repeat(15, 1fr); gap: 2px; height: 100%; align-items: center;
}

.num-btn {
    border: none; font-weight: bold; border-radius: 5px;
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); cursor: pointer;
    display: flex; justify-content: center; align-items: center; height: 85%; width: 100%; box-sizing: border-box; padding: 0;
}
.num-btn span { display: block; width: 100%; text-align: center; pointer-events: none; }

/* FORMAS GEOMÉTRICAS */
.shape-cuadrado { border-radius: 4px; }
.shape-circulo { border-radius: 50%; aspect-ratio: 1; max-height: 85%; }
.shape-rombo { transform: rotate(45deg); aspect-ratio: 1; max-height: 70%; width: 70%; margin: auto; }
.shape-rombo span { transform: rotate(-45deg); }
.shape-hexagonal { clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); }
.shape-ovalo { border-radius: 14px / 7px; }
.shape-octagono { clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%); }
.shape-ticket { clip-path: polygon(0% 10%, 10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%); }
.shape-cruzado { border-radius: 10px 3px 10px 3px; }

.num-btn.marked {
    background: #00cc44 !important; color: white !important; box-shadow: 0 0 8px #00ff55;
}

/* INTERRUPTORES AJUSTES */
.switch-container {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.02); padding: 5px 8px; border-radius: 10px; margin-bottom: 4px;
}
.ios-switch {
    position: relative; width: 52px; height: 26px; background: #e4e4e5;
    border-radius: 13px; cursor: pointer; transition: background 0.25s; display: flex; align-items: center;
}
.ios-switch::after {
    content: ''; position: absolute; left: 2px; top: 2px; width: 22px; height: 22px;
    background: white; border-radius: 50%; transition: left 0.25s;
}
.ios-switch .switch-text { position: absolute; font-size: 8px; font-weight: 900; color: rgba(0,0,0,0.25); text-transform: uppercase; }
.ios-switch .text-on { left: 8px; display: none; color: white; }
.ios-switch .text-off { right: 8px; display: block; }
.ios-switch.active { background: #2cd46b; }
.ios-switch.active::after { left: 28px; }
.ios-switch.active .text-on { display: block; }
.ios-switch.active .text-off { display: none; }

/* POPUPS COMPLETAMENTE REDISEÑADOS Y OPERATIVOS */
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; z-index: 20000; }
.popup-ball-content { text-align: center; animation: ballZoom 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.2); padding: 20px; width: 90%; }

#bingo-popup-title { color: #ffd400; text-shadow: 0 0 30px #ffd400; font-weight: 900; margin: 0; line-height: 1; }
#bingo-popup-phrase { color: #ffffff; margin-top: 15px; font-weight: bold; line-height: 1.2; }

/* CONFIGURACIÓN SIDEBAR */
.settings-btn {

    display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 17000; font-size: 16px;

.settings-panel {

    display: flex; flex-direction: column; gap: 5px; box-sizing: border-box;

.settings-panel.open { right: 0; }
.settings-panel h3 { margin: 0 0 6px 0; color: #ffd400; border-bottom: 1px solid #222; padding-bottom: 4px; font-size: 13px; }

select, input { padding: 4px 6px; border-radius: 5px; background: #141414; border: 1px solid #2b2b2b; color: white; font-size: 11px; width: 100%; box-sizing: border-box; }

function buildMasterBoardUI() {
    const board = document.getElementById("master-board");
    board.innerHTML = "";
    const letters = ["B", "I", "N", "G", "O"];
    const ranges = [{s:1, e:15},{s:16, e:30},{s:31, e:45},{s:46, e:60},{s:61, e:75}];

    letters.forEach((l, idx) => {
        let row = document.createElement("div"); row.className = "bingo-row";
        let header = document.createElement("div"); header.className = "letter-header"; header.innerText = l;
        row.appendChild(header);
        let subgrid = document.createElement("div"); subgrid.className = "numbers-subgrid";

        for (let i = ranges[idx].s; i <= ranges[idx].e; i++) {
            let b = document.createElement("button");
            b.className = "num-btn"; b.innerHTML = `<span>${i}</span>`;
            b.onclick = () => processBallSelection(i);
            subgrid.appendChild(b);
        }
        row.appendChild(subgrid); board.appendChild(row);
    });
}

function processBallSelection(i) {
    let l = "BINGO"[Math.floor((i-1)/15)];
    if (markedNumbers.has(i)) {
        markedNumbers.delete(i);
        document.getElementById("left-display-ball").innerText = "--";
    } else {
        markedNumbers.add(i);
        if (config.sound === "on") { clickSound.currentTime = 0; clickSound.play().catch(()=>{}); }
        document.getElementById("left-display-ball").innerText = l + "-" + i;

        triggerGiantBallPopup(l, i);
        runParticleCelebration(false); 

        let textVoiceGender = config.voiceGender === "on" ? "male" : "female";
        executeVoiceSynthesis(l + " " + i, textVoiceGender);

        if (autoCloseTimeout) clearTimeout(autoCloseTimeout);
        if (config.popDuration !== "manual") {
            autoCloseTimeout = setTimeout(() => { closeBallPopup(); }, parseInt(config.popDuration));
        }
    }
    renderStateUI();
}

}

function runParticleCelebration(isBingo = false) {
    let mode = config.particleEffect;
    let mult = isBingo ? 3 : 1;
    let targetZ = 35000;

    if (mode === "confetti") { confetti({ particleCount: 85 * mult, spread: 85, origin: { y: 0.6 }, zIndex: targetZ }); } 
    else if (mode === "nieve") {
        let end = Date.now() + (isBingo ? 3000 : 2000);
        (function frame() {
            confetti({ particleCount: 3, angle: 270, spread: 360, startVelocity: 12, origin: { x: Math.random(), y: 0 }, colors: ['#ffffff'], zIndex: targetZ });
            if (Date.now() < end) { requestAnimationFrame(frame); }
        }());
    } 
    else if (mode === "dulces") {
        let end = Date.now() + 1800;
        (function frame() {
            confetti({ particleCount: 3 * mult, angle: 270, spread: 180, startVelocity: 15, origin: { x: Math.random(), y: -0.1 }, shapes: [confetti.shapeFromText({ text: '🍬' }), confetti.shapeFromText({ text: '🍭' })], scalar: 2.3, zIndex: targetZ });
            if (Date.now() < end) { requestAnimationFrame(frame); }
        }());
    } 
    else if (mode === "halloween") {
        let end = Date.now() + 1800;
        (function frame() {
            confetti({ particleCount: 2 * mult, angle: 270, spread: 180, startVelocity: 15, origin: { x: Math.random(), y: -0.1 }, shapes: [confetti.shapeFromText({ text: '👻' }), confetti.shapeFromText({ text: '🎃' })], scalar: 2.5, zIndex: targetZ });
            if (Date.now() < end) { requestAnimationFrame(frame); }
        }());
    } 
    else if (mode === "stars") { confetti({ particleCount: 75 * mult, spread: 130, colors: ['#ffd700', '#ffffff'], zIndex: targetZ }); } 
    else if (mode === "fuegos") {
        let duration = isBingo ? 2500 : 1500; let animationEnd = Date.now() + duration;
        let interval = setInterval(function() {
            if (Date.now() > animationEnd) { return clearInterval(interval); }
            confetti({ startVelocity: 30, spread: 360, particleCount: 40, origin: { x: Math.random() * 0.4 + 0.3, y: Math.random() - 0.1 }, zIndex: targetZ });
        }, 150);
    }
    else if (mode === "discoteca") {
        confetti({ particleCount: 45 * mult, angle: 60, spread: 60, origin: { x: 0, y: 0.9 }, colors: ['#ff00ff', '#00ffff'], zIndex: targetZ });
        confetti({ particleCount: 45 * mult, angle: 120, spread: 60, origin: { x: 1, y: 0.9 }, colors: ['#ffff00', '#ff0055'], zIndex: targetZ });
    }
}

function executeVoiceSynthesis(phrase, gender) {
    if (config.voice !== "on") return;
    if ('speechSynthesis' in window) {
        speechSynthesis.cancel();
        let utterance = new SpeechSynthesisUtterance(phrase);
        utterance.lang = "es-MX"; 
        let voices = speechSynthesis.getVoices();
        let targetVoice = voices.find(v => v.lang.includes("es") && (gender === "male" ? v.name.toLowerCase().includes("david") : v.name.toLowerCase().includes("sabina")));
        if(targetVoice) utterance.voice = targetVoice;
        speechSynthesis.speak(utterance);
    }
}

function drawMiniFigureGrid(matrix) {
    let box = document.getElementById("figure-board"); box.innerHTML = "";
    for(let i=0; i<25; i++) {

        if(matrix.includes(i)) { cell.classList.add("active"); cell.innerText = "⭐"; }
        box.appendChild(cell);
    }
}
